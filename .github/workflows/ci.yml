name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci || npm install

      - name: Run CI unit tests
        run: npm run test:ci

      - name: Python syntax check (scripts/python)
        run: |
          python3 -m compileall -q scripts/python

      - name: Migration dry-run (in-memory checks)
        run: node scripts/migrations/migrate.mjs --check

      - name: Production stack verify (structural, no CDP)
        run: npm run egx:verify:fast

      - name: Automation scripts verify (CI mode)
        run: node scripts/egx_automation_verify.mjs --ci
